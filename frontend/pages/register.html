<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register/Login - BookStore</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/api-config.js"></script>
    <script src="/js/mock-data.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/customer-api.js"></script>
    <script src="/js/book-api.js"></script>
    <script src="/js/cart-api.js"></script>
    <script src="/js/order-api.js"></script>
    <script src="/js/rating-api.js"></script>
</head>

<body
    style="background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div id="alert-container"></div>

    <div style="width: 100%; max-width: 400px; padding: 2rem;">
        <div class="card" style="box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 0.5rem;">📚</div>
                <h1 style="color: var(--primary-color);">BookStore</h1>
                <p style="color: var(--dark-gray);">Your online bookshop</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" style="display: none;">
                <h2 class="card-title">Login</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-input" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" id="login-password" required>
                </div>
                <button type="button" class="btn btn-success btn-block" onclick="handleLogin()">Login</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <p style="color: var(--dark-gray);">Don't have an account? <a href="#" onclick="switchForm()"
                            style="color: var(--secondary-color); text-decoration: none; font-weight: bold;">Register</a>
                    </p>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form">
                <h2 class="card-title">Create Account</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-input" id="register-name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-input" id="register-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" id="register-password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="form-input" id="register-confirm-password" required>
                </div>
                <button type="button" class="btn btn-success btn-block" onclick="handleRegister()">Create
                    Account</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <p style="color: var(--dark-gray);">Already have an account? <a href="#" onclick="switchForm()"
                            style="color: var(--secondary-color); text-decoration: none; font-weight: bold;">Login</a>
                    </p>
                </div>
            </form>

            <!-- Demo Users -->
            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--light-gray);">
                <p style="text-align: center; color: var(--dark-gray); font-size: 0.9rem; margin-bottom: 1rem;">Demo
                    Accounts:</p>
                <button type="button" class="btn btn-secondary btn-block"
                    onclick="demoLogin('customer1@bookstore.com', '123456')" style="margin-bottom: 0.5rem;">
                    Demo Customer 1
                </button>
                <button type="button" class="btn btn-secondary btn-block"
                    onclick="demoLogin('customer2@bookstore.com', '123456')">
                    Demo Customer 2
                </button>
            </div>
        </div>
    </div>

    <script>
        function switchForm() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
            registerForm.style.display = registerForm.style.display === 'none' ? 'block' : 'none';
        }

        async function handleRegister() {
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            if (!name || !email || !password) {
                showAlert('Please fill in all fields', 'danger');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'danger');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'danger');
                return;
            }

            try {
                setLoading(true);
                const customer = await registerCustomer({
                    name: name,
                    email: email,
                    password: password
                });

                setCurrentCustomer(customer.id, customer.name);
                showAlert('Account created successfully! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (error) {
                setLoading(false);
                showAlert(error.message || 'Registration failed', 'danger');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showAlert('Please enter email and password', 'danger');
                return;
            }

            try {
                setLoading(true);
                // In a real app, this would validate credentials
                // For demo purposes, we'll accept the login and create a mock customer
                const customer = {
                    id: Math.floor(Math.random() * 10000),
                    name: email.split('@')[0],
                    email: email
                };

                setCurrentCustomer(customer.id, customer.name);
                showAlert('Logged in successfully! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (error) {
                setLoading(false);
                showAlert('Login failed', 'danger');
            }
        }

        async function demoLogin(email, password) {
            const name = email.split('@')[0];
            const customerId = Math.floor(Math.random() * 10000);

            setCurrentCustomer(customerId, name);
            showAlert(`Logged in as ${name}`, 'success');
            setTimeout(() => window.location.href = 'index.html', 1500);
        }

        // Check if already logged in
        if (getCurrentCustomerId()) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
